<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="附近巴士">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/KMB_Logo.svg/1024px-KMB_Logo.svg.png">
  <title>附近巴士 (九巴+城巴)</title>
  
  <style>
    :root { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-sec: #ebebf599; --accent: #ffd60a; --blue: #0a84ff; }
    body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; }
    .header { background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px); padding: 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
    .header-title { font-size: 20px; font-weight: 700; }
    .refresh-btn { background: rgba(10, 132, 255, 0.15); border: none; color: var(--blue); padding: 8px 16px; border-radius: 16px; font-weight: 600; cursor: pointer; }
    .list-container { padding: 16px; }
    .bus-card { background-color: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .route-num { font-size: 26px; font-weight: 800; }
    .eta-time { font-size: 28px; font-weight: 800; color: var(--accent); }
    .status-area { text-align: center; padding: 40px; color: var(--text-sec); }
    .install-prompt { display: none; position: fixed; left: 50%; transform: translateX(-50%); background-color: rgba(255, 255, 255, 0.98); color: #000; padding: 18px 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 9999; width: 85%; max-width: 340px; text-align: center; animation: popIn 0.5s forwards; }
    .close-btn { position: absolute; top: 8px; right: 12px; background: none; border: none; font-size: 20px; color: #aaa; cursor: pointer; }
    @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, 20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">📍 附近巴士</div>
    <button class="refresh-btn" id="refreshBtn" onclick="initGeolocation()">更新</button>
  </div>

  <div class="list-container" id="busList">
    <div class="status-area">正在搜尋中...</div>
  </div>

  <div id="installPrompt" class="install-prompt"></div>

  <script>
    const SEARCH_RADIUS = 400; 
    let stopsCache = { kmb: null, ct: null };

    // 💡 內建 3 次重試機制
    async function fetchWithRetry(url, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error();
          return await res.json();
        } catch (e) {
          if (i === retries - 1) throw e;
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }

    // 💡 安裝引導檢查
    function checkInstallPrompt() {
      const ua = navigator.userAgent.toLowerCase();
      const isIOS = /ipad|iphone|ipod/.test(ua) && !window.MSStream;
      const isAndroid = /android/.test(ua);
      const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
      if (!isStandalone) {
        setTimeout(() => {
          const promptEl = document.getElementById('installPrompt');
          if (isIOS) {
            promptEl.style.bottom = '25px';
            promptEl.innerHTML = `<button class="close-btn" onclick="this.parentElement.style.display='none'">✕</button>
              <div style="font-weight:700; margin-bottom: 8px; color:var(--blue);">💡 升級專屬 App</div>
              <div style="text-align: left; font-size: 14px;">1. 點擊下方分享按鈕<br>2. 往下滑動點選<b>「加入主畫面」</b></div>`;
            promptEl.style.display = 'block';
          } else if (isAndroid) {
            promptEl.style.top = '15px';
            promptEl.innerHTML = `<button class="close-btn" onclick="this.parentElement.style.display='none'">✕</button>
              <div style="font-weight:700; margin-bottom: 8px; color:var(--blue);">💡 升級專屬 App</div>
              <div style="text-align: left; font-size: 14px;">1. 點擊右上角 ⋮ 選單<br>2. 選擇<b>「加至主畫面」</b></div>`;
            promptEl.style.display = 'block';
          }
        }, 2000);
      }
    }

    // 💡 定位邏輯 (5分鐘緩存)
    function initGeolocation(retryCount = 0) {
      document.getElementById("refreshBtn").disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => fetchAll(pos.coords.latitude, pos.coords.longitude),
        (err) => {
          if (retryCount < 1) setTimeout(() => initGeolocation(retryCount + 1), 2000);
          else document.getElementById("busList").innerHTML = "無法定位。";
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 300000 }
      );
    }

    async function fetchAll(lat, lon) {
      document.getElementById("busList").innerHTML = "正在獲取資料...";
      
      const results = await Promise.allSettled([
        fetchWithRetry("https://data.etabus.gov.hk/v1/transport/kmb/stop"),
        fetchWithRetry("https://rt.data.gov.hk/v1.1/transport/citybus-nwfb/stop/all")
      ]);

      const stops = [
        ...(results[0].status === 'fulfilled' ? results[0].value.data.map(s => ({...s, lat: parseFloat(s.lat), long: parseFloat(s.long), type: 'kmb'})) : []),
        ...(results[1].status === 'fulfilled' ? results[1].value.data.map(s => ({...s, lat: parseFloat(s.lat), long: parseFloat(s.long), type: 'ct'})) : [])
      ];

      const nearby = stops.filter(s => {
        let d = Math.sqrt(Math.pow((s.lat - lat) * 111000, 2) + Math.pow((s.long - lon) * 111000, 2));
        return d <= SEARCH_RADIUS;
      });

      const etas = (await Promise.all(nearby.map(async s => {
        try {
          const url = s.type === 'kmb' ? `https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${s.stop}` : `https://rt.data.gov.hk/v1.1/transport/citybus-nwfb/eta/ctb/${s.stop}`;
          const res = await fetchWithRetry(url);
          return (res.data || []).map(e => ({ route: e.route || e.Route, eta: e.eta || e.Et, dest: e.dest_tc || e.DestCn, stopName: s.name_tc }));
        } catch { return []; }
      }))).flat().filter(b => b.eta && new Date(b.eta) > new Date()).sort((a,b) => new Date(a.eta) - new Date(b.eta));

      render(etas);
    }

    function render(etas) {
      const list = document.getElementById("busList");
      list.innerHTML = etas.length ? "" : "暫無班次。";
      etas.forEach(bus => {
        let min = Math.max(0, Math.floor((new Date(bus.eta) - new Date()) / 60000));
        list.innerHTML += `<div class="bus-card">
          <div><div class="route-num">${bus.route}</div><div style="color:#98989d; font-size:13px;">${bus.stopName}</div></div>
          <div class="eta-time">${min === 0 ? "即將" : min} <span style="font-size:13px; color:#888;">${min === 0 ? "到達" : "分"}</span></div>
        </div>`;
      });
      document.getElementById("refreshBtn").disabled = false;
      setTimeout(initGeolocation, 30000);
    }

    initGeolocation();
    checkInstallPrompt();
  </script>
</body>
</html>
