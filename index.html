<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="附近巴士">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/KMB_Logo.svg/1024px-KMB_Logo.svg.png">
  <title>400米內巴士動態</title>
  
  <style>
    :root { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-sec: #ebebf599; --accent: #ffd60a; --kmb-red: #ff3b30; --blue: #0a84ff; }
    body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; }
    .header { background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px 20px 15px; padding-top: env(safe-area-inset-top, 45px); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
    .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .refresh-btn { background: rgba(10, 132, 255, 0.15); border: none; color: var(--blue); font-size: 14px; font-weight: 600; cursor: pointer; padding: 6px 14px; border-radius: 16px; transition: all 0.2s; }
    .refresh-btn:active { opacity: 0.6; transform: scale(0.95); }
    .list-container { padding: 16px; padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px); display: flex; flex-direction: column; gap: 12px; }
    .bus-card { background-color: var(--card-bg); border-radius: 20px; padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .bus-info { flex-grow: 1; overflow: hidden; }
    .route-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .route-num { font-size: 26px; font-weight: 800; color: var(--text-main); }
    .route-dest { font-size: 16px; color: var(--text-sec); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--blue); font-weight: 500; }
    .stop-dist { background: rgba(10, 132, 255, 0.2); padding: 2px 6px; border-radius: 6px; font-size: 11px; }
    .stop-name { color: #98989d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .eta-box { text-align: right; min-width: 70px; display: flex; flex-direction: column; align-items: flex-end; }
    .eta-time { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1.1; }
    .eta-imminent { color: var(--kmb-red); font-size: 24px; }
    .eta-none { color: #666; font-size: 24px; }
    .eta-unit { font-size: 12px; color: var(--text-sec); font-weight: 500; margin-top: 4px; }
    .status-area { text-align: center; padding: 40px 20px; color: var(--text-sec); font-size: 15px; line-height: 1.5; }
    .loader { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255, 255, 255, 0.1); border-radius: 50%; border-top-color: var(--blue); animation: spin 1s ease-in-out infinite; margin-bottom: 12px; }
    .debug-info { margin-top: 15px; font-size: 12px; color: #ff9f0a; background: rgba(255,159,10,0.1); padding: 8px; border-radius: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">📍 附近巴士</div>
    <button class="refresh-btn" id="refreshBtn" onclick="initGeolocation()">更新中...</button>
  </div>

  <div class="list-container" id="busList">
    <div class="status-area" id="statusArea">
      <div class="loader"></div>
      <div id="statusText">正在獲取你的 GPS 位置...</div>
    </div>
  </div>

  <script>
    const SEARCH_RADIUS = 400; 
    let allKmbStopsCache = null;
    let autoRefreshTimer;

    function initGeolocation() {
      const btn = document.getElementById("refreshBtn");
      btn.innerText = "定位中...";
      btn.disabled = true;
      clearTimeout(autoRefreshTimer);

      if (!navigator.geolocation) {
        showError("你的裝置不支援 GPS 定位。");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          fetchNearbyBuses(position.coords.latitude, position.coords.longitude, position.coords.accuracy);
        },
        (error) => {
          let msg = "無法獲取位置。";
          if (error.code === 1) msg = "你拒絕了定位權限，請在設定中開啟。";
          if (error.code === 2) msg = "無法取得 GPS 訊號。";
          if (error.code === 3) msg = "定位超時。";
          showError(msg);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const p1 = lat1 * Math.PI/180;
      const p2 = lat2 * Math.PI/180;
      const dp = (lat2-lat1) * Math.PI/180;
      const dl = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return Math.round(R * c);
    }

    async function fetchNearbyBuses(userLat, userLon, accuracy) {
      const list = document.getElementById("busList");
      const statusText = document.getElementById("statusText");
      
      let debugHtml = `<div class="debug-info">💡 GPS 誤差範圍：約 ${Math.round(accuracy)} 米<br>(如果大於 100 米，代表定位不夠準確)</div>`;
      
      if(statusText) statusText.innerHTML = `正在搜尋 400 米內的巴士站...<br>${debugHtml}`; 
      
      try {
        if (!allKmbStopsCache) {
          let stopsRes = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/stop");
          let stopsJson = await stopsRes.json();
          allKmbStopsCache = stopsJson.data;
        }

        let nearbyStops = allKmbStopsCache.map(stop => {
          return {
            ...stop,
            distance: getDistance(userLat, userLon, stop.lat, stop.long)
          };
        }).filter(stop => stop.distance <= SEARCH_RADIUS);

        if (nearbyStops.length === 0) {
          showError(`在你附近 ${SEARCH_RADIUS} 米內找不到九巴站點。<br>${debugHtml}`);
          return;
        }

        if(statusText) statusText.innerHTML = `找到 ${nearbyStops.length} 個站點，正在獲取到站時間...`;

        let fetchPromises = nearbyStops.map(async (stop) => {
          let etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
          let etaJson = await etaRes.json();
          if (etaJson && etaJson.data) {
            return etaJson.data.map(eta => ({ ...eta, stopName: stop.name_tc, distance: stop.distance }));
          }
          return [];
        });
        
        let results = await Promise.all(fetchPromises);
        let allEtas = results.flat();

        renderUI(allEtas);

      } catch (e) {
        showError("⚠️ 數據獲取失敗，請檢查網路。");
      }
    }

    function renderUI(allEtas) {
      const list = document.getElementById("busList");
      const btn = document.getElementById("refreshBtn");
      list.innerHTML = ""; 

      const now = new Date();
      let validEtas = allEtas.filter(b => b.eta != null && new Date(b.eta) >= now);

      let uniqueEtasMap = new Map();
      validEtas.forEach(b => {
        let key = `${b.route}-${b.dir}-${b.stopName}`;
        if (!uniqueEtasMap.has(key) || new Date(b.eta) < new Date(uniqueEtasMap.get(key).eta)) {
          uniqueEtasMap.set(key, b);
        }
      });
      
      let finalEtas = Array.from(uniqueEtasMap.values());
      
      finalEtas.sort((a, b) => {
        if (a.distance !== b.distance) {
          return a.distance - b.distance;
        }
        return new Date(a.eta) - new Date(b.eta);
      });

      if (finalEtas.length === 0) {
        list.innerHTML = `<div class="status-area">目前附近站點沒有即將到站的班次。</div>`;
      } else {
        finalEtas.forEach(bus => {
          let diff = Math.max(0, Math.floor((new Date(bus.eta) - new Date()) / 60000));
          let etaDisplay = diff.toString();
          let etaClass = "eta-time";
          let unitHtml = '<div class="eta-unit">分鐘</div>';

          if (diff === 0) {
            etaDisplay = "即將";
            etaClass = "eta-time eta-imminent";
            unitHtml = '<div class="eta-unit">到達</div>';
          }

          const card = document.createElement("div");
          card.className = "bus-card";
          card.innerHTML = `
            <div class="bus-info">
              <div class="route-row"><span class="route-num">${bus.route}</span><span class="route-dest">往 ${bus.dest_tc}</span></div>
              <div class="stop-row"><span class="stop-dist">${bus.distance}m</span><span class="stop-name">${bus.stopName} ${bus.w === "Y" ? "♿" : ""}</span></div>
            </div>
            <div class="eta-box"><span class="${etaClass}">${etaDisplay}</span>${unitHtml}</div>
          `;
          // 已移除 card.onclick = () => window.location.href = "app1933://";
          list.appendChild(card);
        });
      }

      btn.innerText = "更新";
      btn.disabled = false;
      autoRefreshTimer = setTimeout(initGeolocation, 30000);
    }

    function showError(msg) {
      const list = document.getElementById("busList");
      const btn = document.getElementById("refreshBtn");
      list.innerHTML = `<div class="status-area">${msg}</div>`;
      btn.innerText = "重新定位";
      btn.disabled = false;
    }

    initGeolocation();
  </script>
</body>
</html>
