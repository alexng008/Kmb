<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="附近巴士">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/KMB_Logo.svg/1024px-KMB_Logo.svg.png">
  <title>400米內巴士動態</title>
  
  <style>
    :root { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-sec: #ebebf599; --accent: #ffd60a; --kmb-red: #ff3b30; --blue: #0a84ff; }
    body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; }
    .header { background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px 20px 15px; padding-top: env(safe-area-inset-top, 45px); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
    .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .refresh-btn { background: rgba(10, 132, 255, 0.15); border: none; color: var(--blue); font-size: 14px; font-weight: 600; cursor: pointer; padding: 6px 14px; border-radius: 16px; transition: all 0.2s; }
    .refresh-btn:active { opacity: 0.6; transform: scale(0.95); }
    
    /* 車站與路線過濾按鈕區塊 */
    .filter-container { display: flex; overflow-x: auto; gap: 10px; padding: 12px 16px 4px; scrollbar-width: none; background-color: var(--bg-color); position: sticky; z-index: 99; }
    .filter-container::-webkit-scrollbar { display: none; }
    
    /* 車站欄固定在 Header 下方 */
    #stopFilters { top: calc(env(safe-area-inset-top, 45px) + 56px); border-bottom: 0.5px solid rgba(255,255,255,0.05); }
    /* 路線欄緊跟在車站欄下方 */
    #routeFilters { top: calc(env(safe-area-inset-top, 45px) + 110px); padding-top: 4px; padding-bottom: 8px; }

    .filter-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: var(--text-sec); border-radius: 20px; padding: 6px 14px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; }
    
    /* 路線按鈕樣式稍微加強辨識度 */
    .route-filter-btn { background: rgba(255, 214, 10, 0.05); border-color: rgba(255, 214, 10, 0.2); color: #ffe66d; }
    .route-filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    .list-container { padding: 16px; padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px); display: flex; flex-direction: column; gap: 12px; }
    .bus-card { background-color: var(--card-bg); border-radius: 20px; padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .bus-info { flex-grow: 1; overflow: hidden; }
    .route-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .route-num { font-size: 26px; font-weight: 800; color: var(--text-main); }
    .route-dest { font-size: 16px; color: var(--text-sec); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--blue); font-weight: 500; }
    .stop-name { color: #98989d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .eta-box { text-align: right; min-width: 70px; display: flex; flex-direction: column; align-items: flex-end; }
    .eta-time { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1.1; }
    .eta-unit { font-size: 12px; color: var(--text-sec); font-weight: 500; margin-top: 4px; }
    .status-area { text-align: center; padding: 40px 20px; color: var(--text-sec); font-size: 15px; line-height: 1.5; }
    .loader { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255, 255, 255, 0.1); border-radius: 50%; border-top-color: var(--blue); animation: spin 1s ease-in-out infinite; margin-bottom: 12px; }
    
    .install-prompt { display: none; position: fixed; left: 50%; transform: translateX(-50%); background-color: rgba(255, 255, 255, 0.98); color: #000; padding: 18px 20px 16px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 9999; width: 85%; max-width: 340px; text-align: center; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .close-btn { position: absolute; top: 8px; right: 12px; background: none; border: none; font-size: 20px; color: #aaa; cursor: pointer; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, 20px) scale(0.9); } 100% { opacity: 1; transform: translate(-50%, 0) scale(1); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">📍 附近巴士</div>
    <button class="refresh-btn" id="refreshBtn" onclick="initGeolocation()">更新</button>
  </div>

  <div id="stopFilters" class="filter-container" style="display: none;"></div>
  
  <div id="routeFilters" class="filter-container" style="display: none;"></div>

  <div class="list-container" id="busList">
    <div class="status-area" id="statusArea">
      <div class="loader"></div>
      <div id="statusText">正在獲取位置...</div>
    </div>
  </div>

  <div id="installPrompt" class="install-prompt"></div>

  <script>
    const SEARCH_RADIUS = 400; 
    let allKmbStopsCache = null;
    let autoRefreshTimer;
    
    let currentEtas = []; 
    let currentFilterStopName = "All"; 
    let currentFilterRoute = "All"; // 💡 新增：儲存當前點選的巴士路線過濾器

    function checkInstallPrompt() {
      const ua = navigator.userAgent.toLowerCase();
      const isIOS = /ipad|iphone|ipod/.test(ua) && !window.MSStream;
      const isAndroid = /android/.test(ua);
      const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

      if (!isStandalone) {
        setTimeout(() => {
          const promptEl = document.getElementById('installPrompt');
          if (isIOS) {
            promptEl.style.bottom = '25px';
            promptEl.innerHTML = `<button class="close-btn" onclick="this.parentElement.style.display='none'">✕</button>
              <div style="font-weight:700; margin-bottom: 12px; color:var(--blue); font-size:17px;">💡 升級專屬 App</div>
              <div style="text-align: left; font-size: 15px; line-height: 2;">1. 點擊下方分享按鈕<br>2. 往下滑動找到<b>「加入主畫面」</b></div>`;
            promptEl.style.display = 'block';
          } else if (isAndroid) {
            promptEl.style.top = '15px';
            promptEl.innerHTML = `<button class="close-btn" onclick="this.parentElement.style.display='none'">✕</button>
              <div style="font-weight:700; margin-bottom: 12px; color:var(--blue); font-size:17px;">💡 升級專屬 App</div>
              <div style="text-align: left; font-size: 15px; line-height: 2;">1. 點擊右上角 ⋮ 選單<br>2. 選擇<b>「加至主畫面」</b></div>`;
            promptEl.style.display = 'block';
          }
        }, 2000);
      }
    }

    async function fetchWithRetry(url, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error();
          return await res.json();
        } catch (e) {
          if (i === retries - 1) throw e;
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }

    function initGeolocation(retryCount = 0) {
      const btn = document.getElementById("refreshBtn");
      btn.innerText = "定位中...";
      btn.disabled = true;
      document.getElementById("stopFilters").style.display = "none"; 
      document.getElementById("routeFilters").style.display = "none"; 

      navigator.geolocation.getCurrentPosition(
        (pos) => fetchNearbyBuses(pos.coords.latitude, pos.coords.longitude),
        (err) => {
          if (retryCount < 1) setTimeout(() => initGeolocation(retryCount + 1), 2000);
          else showError("無法定位，請確認已開啟位置授權。");
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 1800000 }
      );
    }

    async function fetchNearbyBuses(lat, lon) {
      try {
        if (!allKmbStopsCache) {
          allKmbStopsCache = (await fetchWithRetry("https://data.etabus.gov.hk/v1/transport/kmb/stop")).data;
        }

        let nearby = allKmbStopsCache.map(stop => {
          let d = Math.sqrt(Math.pow((stop.lat - lat) * 111000, 2) + Math.pow((stop.long - lon) * 111000, 2));
          return { ...stop, distance: d };
        }).filter(stop => stop.distance <= SEARCH_RADIUS);

        let rawEtas = (await Promise.all(nearby.map(async s => {
          try {
            let pureName = s.name_tc.replace(/\s*\([A-Za-z0-9_]+\)$/, '').trim();
            return (await fetchWithRetry(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${s.stop}`)).data.map(e => ({
              ...e, 
              stopNameRaw: s.name_tc,  
              stopNameClean: pureName, 
              distance: s.distance
            }));
          } catch { return []; }
        }))).flat().filter(b => b.eta && new Date(b.eta) > new Date());

        let uniqueMap = new Map();
        rawEtas.forEach(item => {
          let key = `${item.stopNameClean}_${item.route}_${item.dest_tc}_${item.eta}`;
          if (!uniqueMap.has(key)) {
            uniqueMap.set(key, item);
          } else {
             if ((item.dest_tc || '').length > (uniqueMap.get(key).dest_tc || '').length) {
                 uniqueMap.set(key, item);
             }
          }
        });
        let etas = Array.from(uniqueMap.values());

        etas.sort((a, b) => {
          if (a.distance !== b.distance) {
            return a.distance - b.distance; 
          }
          return new Date(a.eta) - new Date(b.eta);
        });

        currentEtas = etas;
        
        // 驗證過濾狀態是否依然有效
        const availableStops = [...new Set(currentEtas.map(b => b.stopNameClean))];
        if (currentFilterStopName !== "All" && !availableStops.includes(currentFilterStopName)) {
            currentFilterStopName = "All";
        }
        
        // 重新繪製 UI
        renderFilters(); 
        renderRouteFilters(); // 💡 新增：生成路線過濾器
        renderUI();      

        document.getElementById("refreshBtn").innerText = "更新";
        document.getElementById("refreshBtn").disabled = false;
        
        clearTimeout(autoRefreshTimer);
        autoRefreshTimer = setTimeout(() => initGeolocation(), 30000);

      } catch (e) { 
        showError("無法連線至九巴伺服器，請稍後再試。"); 
      }
    }

    // 生成車站按鈕
    function renderFilters() {
      const filterContainer = document.getElementById("stopFilters");
      if (!currentEtas || currentEtas.length === 0) {
        filterContainer.style.display = "none";
        return;
      }
      
      let uniqueStops = [...new Set(currentEtas.map(b => b.stopNameClean))];
      filterContainer.style.display = "flex";
      
      let html = `<button class="filter-btn ${currentFilterStopName === 'All' ? 'active' : ''}" onclick="setFilter('All')">全部車站</button>`;
      uniqueStops.forEach(stop => {
        html += `<button class="filter-btn ${currentFilterStopName === stop ? 'active' : ''}" onclick="setFilter('${stop}')">${stop}</button>`;
      });
      filterContainer.innerHTML = html;
    }

    // 💡 新增：動態生成「巴士路線」過濾按鈕
    function renderRouteFilters() {
      const routeContainer = document.getElementById("routeFilters");
      if (!currentEtas || currentEtas.length === 0) {
        routeContainer.style.display = "none";
        return;
      }

      // 根據當前「已選車站」來決定要顯示哪些路線（如果選了全部車站，就顯示附近全部路線）
      let sourceEtas = currentEtas;
      if (currentFilterStopName !== "All") {
        sourceEtas = currentEtas.filter(b => b.stopNameClean === currentFilterStopName);
      }

      // 提取排序過的不重複路線名稱 (例如: 1A, 78A, A43)
      let uniqueRoutes = [...new Set(sourceEtas.map(b => b.route))].sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

      // 如果當前點選的路線，在切換車站後不存在，則重置為 "All"
      if (currentFilterRoute !== "All" && !uniqueRoutes.includes(currentFilterRoute)) {
        currentFilterRoute = "All";
      }

      routeContainer.style.display = "flex";

      let html = `<button class="filter-btn route-filter-btn ${currentFilterRoute === 'All' ? 'active' : ''}" onclick="setRouteFilter('All')">全部路線</button>`;
      uniqueRoutes.forEach(route => {
        html += `<button class="filter-btn route-filter-btn ${currentFilterRoute === route ? 'active' : ''}" onclick="setRouteFilter('${route}')">${route}</button>`;
      });
      routeContainer.innerHTML = html;
    }

    function setFilter(stopName) {
      currentFilterStopName = stopName;
      // 💡 重大變動：換車站時，將路線選擇重置為全部，避免交叉過濾出空資料
      currentFilterRoute = "All"; 
      
      renderFilters(); 
      renderRouteFilters(); // 重新整理路線按鈕清單
      renderUI();      
    }

    // 💡 新增：處理路線按鈕點擊事件
    function setRouteFilter(routeNum) {
      currentFilterRoute = routeNum;
      renderRouteFilters(); // 更新路線按鈕選取狀態
      renderUI();      
    }

    function renderUI() {
      const list = document.getElementById("busList");
      
      // 💡 雙重過濾邏輯：先過濾車站，再過濾路線
      let displayEtas = currentEtas;
      
      if (currentFilterStopName !== "All") {
        displayEtas = displayEtas.filter(b => b.stopNameClean === currentFilterStopName);
      }
      
      if (currentFilterRoute !== "All") {
        displayEtas = displayEtas.filter(b => b.route === currentFilterRoute);
      }

      list.innerHTML = displayEtas.length ? "" : "<div class='status-area'>所選條件暫無班次。</div>";
      
      displayEtas.forEach(bus => {
        let min = Math.max(0, Math.floor((new Date(bus.eta) - new Date()) / 60000));
        let dist = Math.round(bus.distance); 
        
        list.innerHTML += `<div class="bus-card">
          <div class="bus-info">
            <div class="route-row">
              <span class="route-num">${bus.route}</span>
              <span class="route-dest">往 ${bus.dest_tc}</span>
            </div>
            <div class="stop-row">
              <span class="stop-name">${bus.stopNameRaw}</span>
              <span style="color: #98989d; font-size: 11px; margin-left: 6px;">(${dist}m)</span>
            </div>
          </div>
          <div class="eta-box">
            <span class="eta-time">${min === 0 ? "即將" : min}</span>
            <div class="eta-unit">${min === 0 ? "到達" : "分鐘"}</div>
          </div>
        </div>`;
      });
    }

    function showError(msg) {
      document.getElementById("busList").innerHTML = `<div class="status-area">${msg}</div>`;
      document.getElementById("refreshBtn").innerText = "重試";
      document.getElementById("refreshBtn").disabled = false;
    }

    initGeolocation();
    checkInstallPrompt(); 
  </script>
</body>
</html>
